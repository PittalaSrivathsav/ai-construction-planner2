<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Construction Planner 🏗️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#00c6ff 0%,#0072ff 50%,#00d4ff 100%);
min-height:100vh;
padding:20px;
}

.container{max-width:1200px;margin:auto;}

.header{text-align:center;color:white;margin-bottom:30px;}

.header h1{font-size:2.5em;font-weight:700;}

.input-card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:25px;
margin-bottom:20px;
}

label{color:white;font-weight:500;margin-top:10px;}

input{
width:100%;padding:12px;border-radius:10px;border:none;margin-top:5px;
}

button{
width:100%;padding:14px;margin-top:15px;
border:none;border-radius:12px;
background:#ffd700;font-weight:700;cursor:pointer;
}

.results{display:none;margin-top:20px;}

.result-card{
background:white;
border-radius:15px;
padding:20px;
margin-bottom:20px;
}

.result-card h2{color:#333;margin-bottom:10px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.stat{
background:#f4f6ff;
padding:12px;
border-left:4px solid #0072ff;
border-radius:8px;
}

.ai-advice{
background:#fff9e6;
padding:15px;
border-radius:10px;
}

/* 🔥 NEW AI CARDS */
.ai-card{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
border-left:5px solid #0072ff;
}

.ai-title{
font-weight:700;
color:#0072ff;
margin-bottom:6px;
}

.loading{text-align:center;color:white;display:none;}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🏗️ AI Construction Planner</h1>
<p>Smart Planning with AI 🚀</p>
</div>

<div class="input-card">

<label>Area (sq yards)</label>
<input type="number" id="area">

<label>Floors</label>
<input type="number" id="floors">

<label>
<input type="checkbox" id="accelerate" onchange="toggleTarget()"> Accelerated
</label>

<div id="targetBox" style="display:none;">
<label>Target Days</label>
<input type="number" id="target_days" value="90">
</div>

<button onclick="generatePlan()">Generate Plan</button>
</div>

<div class="loading" id="loading">Generating...</div>

<div class="results" id="results">

<div class="result-card">
<h2>👷 Workers</h2>
<div id="workersContent"></div>
</div>

<div class="result-card">
<h2>📦 Materials</h2>
<div id="materialsContent"></div>
</div>

<div class="result-card">
<h2>📅 Timeline</h2>
<div id="timelineContent"></div>
</div>

<div class="result-card">
<h2>💰 Cost</h2>
<div id="costContent"></div>
</div>

<div class="result-card">
<h2>🤖 AI Expert Advice</h2>
<div class="ai-advice" id="aiAdvice"></div>
</div>

<div class="result-card">
<h2>📋 Schedule</h2>
<div id="scheduleContent"></div>
</div>

</div>
</div>

<script>

function toggleTarget(){
document.getElementById("targetBox").style.display =
document.getElementById("accelerate").checked ? "block" : "none";
}

async function generatePlan(){

const area=document.getElementById('area').value;
const floors=document.getElementById('floors').value;
const accelerate=document.getElementById('accelerate').checked;
const target_days=document.getElementById('target_days').value;

if(!area||!floors){alert("Enter values");return;}

document.getElementById('loading').style.display='block';

const res=await fetch('/plan',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
area:+area,
floors:+floors,
accelerate,
target_days:+target_days
})
});

const data=await res.json();
document.getElementById('loading').style.display='none';
displayResults(data);
}


/* 🔥 FIXED AI FORMAT FUNCTION */
function formatAIAdvice(text){

// Split by numbered sections
const sections = text.split(/\d\.\s+/).filter(s => s.trim() !== "");

let html = "";

sections.forEach((sec, index) => {

const lines = sec.trim().split("\n");
const title = lines[0];
const content = lines.slice(1).join("<br><br>");

html += `
<div class="ai-card">
<div class="ai-title">Point ${index+1}: ${title}</div>
<div>${content}</div>
</div>
`;

});

return html;
}


function displayResults(data){

document.getElementById('workersContent').innerHTML = JSON.stringify(data.workers);
document.getElementById('materialsContent').innerHTML = JSON.stringify(data.materials);
document.getElementById('timelineContent').innerHTML = JSON.stringify(data.timeline);
document.getElementById('costContent').innerHTML = JSON.stringify(data.cost);

// 🔥 ADVANCED AI DISPLAY
document.getElementById('aiAdvice').innerHTML = formatAIAdvice(data.ai_advice);

// Schedule
let scheduleHTML='<table border="1" width="100%">';
data.schedule.forEach(i=>{
scheduleHTML+=`<tr><td>${i.week}</td><td>${i.activity}</td></tr>`;
});
scheduleHTML+='</table>';

document.getElementById('scheduleContent').innerHTML=scheduleHTML;

document.getElementById('results').style.display='block';
}

</script>

</body>
</html>
